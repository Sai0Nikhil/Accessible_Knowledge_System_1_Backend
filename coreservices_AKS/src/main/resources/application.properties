spring.application.name=coreservices

# Server
server.port=${PORT:8001}

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-delicate-hill-aoka5npk-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_Onc3pXLSBV2N}

# JPA / Hibernate
# (dialect is auto-detected from the JDBC URL — no need to set it explicitly)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Pretty SQL in logs (helpful during dev, turn off in prod)
spring.jpa.properties.hibernate.format_sql=true
